[build]
  command   = "npm run build"
  publish   = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Environment variables are managed in the Netlify UI or via netlify.toml
# for non-secret values only. Secret keys (STRIPE_SECRET_KEY etc.) must be
# set in the Netlify dashboard under Site > Environment variables — never
# commit them here.

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"
